name: Vercel Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

env:
  CI: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  test:
    name: Pre-deployment checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test coverage
        run: pnpm test:coverage

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

  deploy-preview:
    name: Preview deployment
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel preview environment
        run: pnpm exec vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview artifact
        run: pnpm exec vercel build --token="$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        id: deploy
        run: |
          DEPLOYMENT_URL="$(pnpm exec vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          {
            echo "### Vercel preview deployment"
            echo
            echo "$DEPLOYMENT_URL"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Production deployment
    needs: test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel production environment
        run: pnpm exec vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifact
        run: pnpm exec vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel production
        id: deploy
        run: |
          DEPLOYMENT_URL="$(pnpm exec vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          {
            echo "### Vercel production deployment"
            echo
            echo "$DEPLOYMENT_URL"
          } >> "$GITHUB_STEP_SUMMARY"
